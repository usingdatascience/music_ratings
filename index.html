<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MusicRatings</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');
  :root {
    --bg:#14110f; --panel:#1d1916; --line:#2c2722; --cream:#f3ece1;
    --muted:#9a8f7f; --dim:#6f6557; --accent:#ff6b4a; --teal:#4ec9b0;
  }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:radial-gradient(1200px 600px at 80% -10%, #241d18 0%, #14110f 55%); color:var(--cream); font-family:'Hanken Grotesk',sans-serif; padding:40px 20px 80px; }
  .container { max-width:760px; margin:0 auto; }

  /* Login */
  .login-wrap { min-height:80vh; display:flex; align-items:center; justify-content:center; }
  .login-card { width:100%; max-width:380px; background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:30px; }
  .login-card .wordmark { font-size:40px; margin:0 0 4px; }
  .login-card .kicker { margin-bottom:24px; }
  .login-card input { width:100%; margin-bottom:12px; }
  .login-err { color:#ff9a82; font-size:13px; margin:4px 0 14px; min-height:16px; line-height:1.4; }

  .kicker { font-size:12px; letter-spacing:.32em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .wordmark { font-family:'Fraunces',serif; font-weight:900; font-size:52px; line-height:.9; margin:0; letter-spacing:-.02em; }
  .rule { height:2px; background:linear-gradient(90deg,var(--accent),transparent); margin:16px 0 8px; }
  .whoami { font-size:12px; color:var(--muted); margin:4px 0 22px; }
  .whoami a { color:var(--teal); cursor:pointer; text-decoration:none; margin-left:8px; }

  .card { background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:24px; margin-bottom:18px; }
  .card-label { font-family:'Fraunces',serif; font-size:20px; font-weight:600; margin-bottom:18px; }
  .input-row { display:flex; gap:12px; margin-bottom:22px; flex-wrap:wrap; }
  .title-wrap { flex:2; min-width:160px; position:relative; }
  input[type=text],input[type=email],input[type=password] { background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:12px 14px; color:var(--cream); font-size:15px; font-family:inherit; outline:none; width:100%; }
  input::placeholder { color:var(--dim); }
  #title { padding-right:52px; }
  #artist-wrap { flex:1.4; min-width:140px; }
  #album-wrap { flex:1.4; min-width:140px; }
  .counter { position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:11px; font-weight:600; letter-spacing:.04em; pointer-events:none; color:var(--dim); }
  .counter.full { color:var(--accent); }
  .sliders { display:flex; flex-direction:column; gap:18px; }
  .slider-head { display:flex; align-items:center; gap:9px; margin-bottom:8px; }
  .dot { width:9px; height:9px; border-radius:50%; }
  .slider-label { font-size:14px; font-weight:600; color:#cfc4b3; }
  .slider-val { margin-left:auto; font-family:'Fraunces',serif; font-weight:600; font-size:18px; }
  input[type=range] { -webkit-appearance:none; appearance:none; width:100%; height:4px; border-radius:4px; background:var(--line); outline:none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:currentColor; cursor:pointer; box-shadow:0 0 0 4px rgba(0,0,0,.25); }
  input[type=range]::-moz-range-thumb { width:16px; height:16px; border:none; border-radius:50%; background:currentColor; cursor:pointer; }
  .form-footer { display:flex; align-items:center; justify-content:space-between; margin-top:24px; flex-wrap:wrap; gap:14px; }
  .draft-score { display:flex; align-items:baseline; gap:8px; }
  .ds-label { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); }
  .ds-val { font-family:'Fraunces',serif; font-weight:900; font-size:30px; }
  .ds-total { font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); font-weight:600; margin-left:4px; }
  .ds-total .max { color:var(--dim); }
  button { font-family:inherit; cursor:pointer; }
  .btn { background:var(--accent); color:var(--bg); border:none; border-radius:10px; padding:12px 22px; font-size:14px; font-weight:700; }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  .btn.full { width:100%; }
  .ghost { background:transparent; color:var(--muted); border:1px solid var(--line); border-radius:10px; padding:12px 18px; font-size:14px; font-weight:600; }
  .status { font-size:13px; padding:10px 14px; border-radius:10px; margin-bottom:18px; line-height:1.5; display:none; }
  .status.show { display:block; }
  .status.err { background:#2a1714; border:1px solid #3a2622; color:#ff9a82; }
  .stats { background:linear-gradient(135deg,#221b16,#1a1512); border:1px solid var(--line); border-radius:18px; padding:24px; margin-bottom:18px; }
  .stats-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; }
  .stat-big { font-family:'Fraunces',serif; font-weight:900; font-size:40px; line-height:1; }
  .stat-sub { font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:4px; }
  .agg-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .agg-label { width:92px; font-size:13px; font-weight:600; color:#cfc4b3; }
  .agg-track { flex:1; height:8px; background:var(--bg); border-radius:6px; overflow:hidden; }
  .agg-fill { height:100%; border-radius:6px; transition:width .4s ease; }
  .agg-val { width:34px; text-align:right; font-family:'Fraunces',serif; font-weight:600; font-size:15px; }
  /* Insights */
  .insights-card { display:block; background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:20px 24px; margin-bottom:18px; }
  .insights-toggle { width:100%; text-align:left; background:transparent; border:none; color:var(--cream); font-family:'Fraunces',serif; font-size:20px; font-weight:600; padding:0; }
  .ins-block { margin-top:22px; }
  .ins-h { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
  .ins-note { font-size:12px; color:var(--dim); line-height:1.5; margin-top:10px; }
  .radar-picks { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:8px; }
  .radar-pick { display:flex; flex-direction:column; gap:4px; flex:1; min-width:130px; }
  .radar-pick span { font-size:11px; color:var(--muted); }
  .radar-pick select { background:var(--bg); border:1px solid var(--line); color:var(--cream); border-radius:8px; padding:8px 10px; font-size:13px; font-family:inherit; }
  .radar-wrap { display:flex; justify-content:center; }
  .radar-legend { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-top:6px; font-size:12px; }
  .radar-legend span { display:inline-flex; align-items:center; gap:6px; }
  .legdot { width:10px; height:10px; border-radius:2px; }
  .heat { display:grid; grid-template-columns:auto repeat(4, 1fr); gap:4px; }
  .heat-cell { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:6px; font-size:12px; font-weight:700; font-variant-numeric:tabular-nums; }
  .heat-head { display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--muted); font-weight:600; }
  .heat-rowhead { display:flex; align-items:center; justify-content:flex-end; padding-right:6px; font-size:11px; color:var(--muted); font-weight:600; }
  .sort-bar { display:flex; align-items:center; gap:14px; margin-bottom:16px; flex-wrap:wrap; }
  .sort-label { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); }
  .chips { display:flex; gap:8px; flex-wrap:wrap; }
  .chip { background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:20px; padding:6px 14px; font-size:13px; font-weight:600; }
  .chip.active { background:var(--cream); color:var(--bg); border-color:var(--cream); }
  .export { margin-left:auto; background:transparent; border:1px solid var(--teal); color:var(--teal); border-radius:20px; padding:6px 16px; font-size:13px; font-weight:700; }
  .list { display:flex; flex-direction:column; gap:12px; }
  .empty { text-align:center; color:var(--muted); padding:40px 20px; border:1px dashed var(--line); border-radius:16px; font-size:15px; line-height:1.5; }
  .song { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:18px; display:flex; gap:18px; align-items:flex-start; }
  .score-col { flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .badge { width:58px; height:58px; border-radius:12px; border:2px solid; display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-weight:900; font-size:22px; }
  .total-cap { font-family:'Fraunces',serif; font-weight:600; font-size:15px; color:#cfc4b3; }
  .total-cap .max { color:var(--dim); font-size:12px; }
  .song-main { flex:1; min-width:0; }
  .song-head { margin-bottom:12px; display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
  .song-title { font-family:'Fraunces',serif; font-size:19px; font-weight:600; }
  .song-artist { font-size:14px; color:var(--muted); }
  .breakdown { display:grid; grid-template-columns:repeat(2,1fr); gap:10px 18px; }
  .bd-top { display:flex; justify-content:space-between; margin-bottom:4px; }
  .bd-label { font-size:12px; color:var(--muted); }
  .bd-val { font-size:12px; font-weight:700; }
  .bd-track { height:5px; background:var(--bg); border-radius:4px; overflow:hidden; }
  .bd-fill { height:100%; border-radius:4px; }
  .song-actions { display:flex; flex-direction:column; gap:8px; flex-shrink:0; }
  .icon-btn { background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:8px; padding:6px 12px; font-size:12px; font-weight:600; }
  .icon-btn.danger { color:#e8617a; border-color:#3a2622; }
  .icon-btn.armed { background:#e8617a; color:var(--bg); border-color:#e8617a; }
  .artist-filter { background:var(--bg); border:1px solid var(--line); color:var(--cream); border-radius:20px; padding:6px 12px; font-size:13px; font-weight:600; font-family:inherit; max-width:180px; }
  .hidden { display:none !important; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-view">
  <div class="login-card">
    <div class="kicker">a personal listening ledger</div>
    <h1 class="wordmark">MusicRatings</h1>
    <div style="height:18px;"></div>
    <input type="email" id="login-email" placeholder="Email" autocomplete="username" />
    <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password" />
    <div class="login-err" id="login-err"></div>
    <button class="btn full" id="login-btn">Sign in</button>
  </div>
</div>

<!-- APP -->
<div class="container hidden" id="app-view">
  <header>
    <div class="kicker">a personal listening ledger</div>
    <h1 class="wordmark">MusicRatings</h1>
    <div class="rule"></div>
    <div class="whoami"><span id="whoami-email"></span><a id="signout">Sign out</a></div>
  </header>

  <div id="status" class="status"></div>

  <section class="card">
    <div class="card-label" id="form-label">Rate a song</div>
    <div class="input-row">
      <div class="title-wrap">
        <input type="text" id="title" placeholder="Song title" maxlength="70" />
        <span class="counter" id="counter">0/70</span>
      </div>
      <div id="artist-wrap"><input type="text" id="artist" placeholder="Artist" /></div>
      <div id="album-wrap"><input type="text" id="album" placeholder="Album" /></div>
    </div>
    <div class="sliders" id="sliders"></div>
    <div class="form-footer">
      <div class="draft-score">
        <span class="ds-label">overall</span>
        <span class="ds-val" id="draft-overall">10.0</span>
        <span class="ds-total">total <span id="draft-total">40</span><span class="max">/80</span></span>
      </div>
      <div style="display:flex; gap:10px;">
        <button class="ghost" id="cancel-btn" style="display:none;">Cancel</button>
        <button class="btn" id="save-btn" disabled>Add to ledger</button>
      </div>
    </div>
  </section>

  <section id="stats"></section>
  <section id="insights"></section>
  <div id="sort-bar"></div>
  <section class="list" id="list"></section>
</div>

<script>
// ── Config ───────────────────────────────────────────────────
const SUPABASE_URL = "https://owshlqzsvlpwzcuzdbvo.supabase.co";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93c2hscXpzdmxwd3pjdXpkYnZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MjQ0ODUsImV4cCI6MjA5NTQwMDQ4NX0.n4X2F8MFZ8L83uyt7DZiOkegYQtDDEjcgrnJ1NE0vjU";
const REST = SUPABASE_URL + "/rest/v1/songs";
const AUTH = SUPABASE_URL + "/auth/v1";
const SESSION_KEY = "mr_session";

const DIMENSIONS = [
  { key:"lyrics", label:"Lyrics", color:"#ff6b4a" },
  { key:"melody", label:"Melody", color:"#f4b740" },
  { key:"vocals", label:"Vocals", color:"#4ec9b0" },
  { key:"emotiveness", label:"Emotiveness", color:"#e8617a" },
];
const MIN=1, MAX=20, STEP=0.5, TITLE_MAX=70, MAX_TOTAL=MAX*DIMENSIONS.length;

let songs = [], editingId = null, sortBy = "recent", session = null, artistFilter = "__all__";
let insightsOpen = false, radarA = null, radarB = "__none__";

// ── Helpers ──────────────────────────────────────────────────
const totalOf = s => DIMENSIONS.reduce((a,d)=>a+Number(s[d.key]),0);
const overallOf = s => totalOf(s)/DIMENSIONS.length;
const fmt = n => (Math.round(n*10)/10).toFixed(1);
const esc = str => String(str ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function scoreHue(n){ if(n>=17)return"#4ec9b0"; if(n>=14)return"#9ad26b"; if(n>=10)return"#f4b740"; if(n>=6)return"#ff8a4a"; return"#ff6b4a"; }
function setStatus(msg, kind){ const el=document.getElementById("status"); if(!msg){el.className="status";el.textContent="";return;} el.className="status show "+(kind||"err"); el.textContent=msg; }
const $ = id => document.getElementById(id);

// ── Auth ─────────────────────────────────────────────────────
function loadSession(){ try { const s=localStorage.getItem(SESSION_KEY); return s?JSON.parse(s):null; } catch(e){ return null; } }
function saveSession(data){
  session = { access_token:data.access_token, refresh_token:data.refresh_token,
              expires_at:data.expires_at || (Math.floor(Date.now()/1000)+(data.expires_in||3600)),
              email:(data.user && data.user.email) || (session && session.email) || "" };
  try { localStorage.setItem(SESSION_KEY, JSON.stringify(session)); } catch(e){}
}
function clearSession(){ session=null; try{ localStorage.removeItem(SESSION_KEY); }catch(e){} }

async function signIn(email, password){
  const res = await fetch(AUTH+"/token?grant_type=password", {
    method:"POST", headers:{ apikey:ANON_KEY, "Content-Type":"application/json" },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error_description || data.msg || data.error || ("HTTP "+res.status));
  saveSession(data);
  return session;
}
async function refresh(){
  if(!session || !session.refresh_token) return false;
  try {
    const res = await fetch(AUTH+"/token?grant_type=refresh_token", {
      method:"POST", headers:{ apikey:ANON_KEY, "Content-Type":"application/json" },
      body: JSON.stringify({ refresh_token: session.refresh_token })
    });
    if(!res.ok) return false;
    const data = await res.json();
    saveSession(data);
    return true;
  } catch(e){ return false; }
}

function showLogin(){ $("app-view").classList.add("hidden"); $("login-view").classList.remove("hidden"); }
function showApp(){
  $("login-view").classList.add("hidden"); $("app-view").classList.remove("hidden");
  $("whoami-email").textContent = "Signed in as " + (session.email || "you");
}

// ── REST (authenticated) ─────────────────────────────────────
function restHeaders(){ return { apikey:ANON_KEY, Authorization:"Bearer "+session.access_token, "Content-Type":"application/json" }; }

async function api(method, path, body, retried){
  const opts = { method, headers: restHeaders() };
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(REST+(path||""), opts);
  if(res.status===401 && !retried){
    const ok = await refresh();
    if(ok) return api(method, path, body, true);
    clearSession(); showLogin();
    throw new Error("Session expired — please sign in again.");
  }
  if(!res.ok){ const t=await res.text().catch(()=> ""); throw new Error("HTTP "+res.status+" "+t); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadSongs(){
  try { songs = await api("GET","?select=*&order=created_at.desc"); setStatus(""); renderAll(); }
  catch(err){ if(session) setStatus("Couldn't load songs — "+err.message); }
}

// ── Form ─────────────────────────────────────────────────────
function buildSliders(){
  $("sliders").innerHTML = DIMENSIONS.map(d => `
    <div class="slider-row">
      <div class="slider-head"><span class="dot" style="background:${d.color}"></span>
        <span class="slider-label">${d.label}</span>
        <span class="slider-val" id="val-${d.key}" style="color:${d.color}">10</span></div>
      <input type="range" id="rng-${d.key}" min="${MIN}" max="${MAX}" step="${STEP}" value="10" style="color:${d.color}; accent-color:${d.color}" />
    </div>`).join("");
  DIMENSIONS.forEach(d => $("rng-"+d.key).addEventListener("input", refreshDraft));
}
function readDraft(){ const d={ title:$("title").value, artist:$("artist").value, album:$("album").value }; DIMENSIONS.forEach(x=>d[x.key]=Number($("rng-"+x.key).value)); return d; }
function refreshDraft(){
  const d=readDraft();
  DIMENSIONS.forEach(x=>$("val-"+x.key).textContent=d[x.key]);
  const ov=overallOf(d), tot=totalOf(d);
  const ovEl=$("draft-overall"); ovEl.textContent=fmt(ov); ovEl.style.color=scoreHue(ov);
  $("draft-total").textContent=tot;
  const t=$("title").value, c=$("counter");
  c.textContent=t.length+"/"+TITLE_MAX; c.className="counter"+(t.length>=TITLE_MAX?" full":"");
  $("save-btn").disabled=!t.trim();
}
function resetForm(){
  $("title").value=""; $("artist").value=""; $("album").value="";
  DIMENSIONS.forEach(d=>$("rng-"+d.key).value=10);
  editingId=null; $("form-label").textContent="Rate a song";
  $("save-btn").textContent="Add to ledger"; $("cancel-btn").style.display="none"; refreshDraft();
}
function startEdit(s){
  $("title").value=s.title; $("artist").value=s.artist||""; $("album").value=s.album||"";
  DIMENSIONS.forEach(d=>$("rng-"+d.key).value=Number(s[d.key]));
  editingId=s.id; $("form-label").textContent="Editing rating";
  $("save-btn").textContent="Update"; $("cancel-btn").style.display=""; refreshDraft();
  window.scrollTo({top:0,behavior:"smooth"});
}
async function save(){
  const d=readDraft(); if(!d.title.trim()) return;
  const payload={ title:d.title.trim(), artist:d.artist.trim(), album:(d.album||"").trim() };
  DIMENSIONS.forEach(x=>payload[x.key]=d[x.key]);
  const btn=$("save-btn"); btn.disabled=true; btn.textContent="Saving…";
  try {
    if(editingId) await api("PATCH","?id=eq."+editingId,payload);
    else await api("POST","",payload);
    resetForm(); await loadSongs();
  } catch(err){ setStatus("Save failed — "+err.message); btn.disabled=false; btn.textContent=editingId?"Update":"Add to ledger"; }
}
async function removeSong(id){
  try { await api("DELETE","?id=eq."+id); if(editingId===id) resetForm(); await loadSongs(); }
  catch(err){ setStatus("Delete failed — "+err.message); }
}

// ── Rendering ────────────────────────────────────────────────
function renderStats(){
  const el=$("stats");
  if(!songs.length){ el.className=""; el.innerHTML=""; return; }
  const avg=k=>songs.reduce((a,s)=>a+Number(s[k]),0)/songs.length;
  const meanOverall=songs.reduce((a,s)=>a+overallOf(s),0)/songs.length;
  el.className="stats";
  el.innerHTML=`<div class="stats-top">
      <div><div class="stat-big">${songs.length}</div><div class="stat-sub">${songs.length===1?"song":"songs"} rated</div></div>
      <div style="text-align:right;"><div class="stat-big" style="color:${scoreHue(meanOverall)}">${fmt(meanOverall)}</div><div class="stat-sub">mean overall</div></div></div>
    ${DIMENSIONS.map(d=>{const a=avg(d.key);return `<div class="agg-row"><span class="agg-label">${d.label}</span>
      <div class="agg-track"><div class="agg-fill" style="width:${a*5}%; background:${d.color}"></div></div>
      <span class="agg-val">${fmt(a)}</span></div>`;}).join("")}`;
}
function renderSortBar(){
  const el=$("sort-bar");
  if(!songs.length){ el.innerHTML=""; return; }
  const opts=[{v:"recent",l:"Recent"},{v:"overall",l:"Overall"}].concat(DIMENSIONS.map(d=>({v:d.key,l:d.label})));
  const artists=Array.from(new Set(songs.map(s=>s.artist).filter(Boolean))).sort((a,b)=>a.localeCompare(b));
  if(artistFilter!=="__all__" && !artists.includes(artistFilter)) artistFilter="__all__";
  el.className="sort-bar";
  el.innerHTML=`<span class="sort-label">Sort by</span>
    <div class="chips">${opts.map(o=>`<button class="chip ${sortBy===o.v?"active":""}" data-sort="${o.v}">${o.l}</button>`).join("")}</div>
    <select class="artist-filter" id="artist-filter">
      <option value="__all__">All artists</option>
      ${artists.map(a=>`<option value="${esc(a)}" ${artistFilter===a?"selected":""}>${esc(a)}</option>`).join("")}
    </select>
    <button class="export" id="export-btn">↓ Export CSV</button>`;
  el.querySelectorAll("[data-sort]").forEach(b=>b.addEventListener("click",()=>{sortBy=b.dataset.sort;renderAll();}));
  $("artist-filter").addEventListener("change",e=>{ artistFilter=e.target.value; renderAll(); });
  $("export-btn").addEventListener("click",exportCSV);
}
function applySort(arr){
  if(sortBy==="recent") arr.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  else if(sortBy==="overall") arr.sort((a,b)=>overallOf(b)-overallOf(a));
  else arr.sort((a,b)=>Number(b[sortBy])-Number(a[sortBy]));
  return arr;
}
function listView(){
  let arr=songs.slice();
  if(artistFilter && artistFilter!=="__all__") arr=arr.filter(s=>(s.artist||"")===artistFilter);
  return applySort(arr);
}
function renderList(){
  const el=$("list");
  if(!songs.length){ el.innerHTML=`<div class="empty">No songs yet. Rate one above — it saves to your account and syncs to every device you sign in on.</div>`; return; }
  const view=listView();
  if(!view.length){ el.innerHTML=`<div class="empty">No songs by that artist.</div>`; return; }
  el.innerHTML=view.map(s=>{
    const ov=overallOf(s);
    const sub=[esc(s.artist),esc(s.album)].filter(Boolean).join(" · ");
    return `<article class="song">
      <div class="score-col"><div class="badge" style="border-color:${scoreHue(ov)}; color:${scoreHue(ov)}">${fmt(ov)}</div>
        <div class="total-cap">${totalOf(s)}<span class="max">/${MAX_TOTAL}</span></div></div>
      <div class="song-main">
        <div class="song-head"><span class="song-title">${esc(s.title)}</span>${sub?`<span class="song-artist">— ${sub}</span>`:""}</div>
        <div class="breakdown">${DIMENSIONS.map(d=>`<div><div class="bd-top"><span class="bd-label">${d.label}</span><span class="bd-val" style="color:${d.color}">${Number(s[d.key])}</span></div>
          <div class="bd-track"><div class="bd-fill" style="width:${Number(s[d.key])*5}%; background:${d.color}"></div></div></div>`).join("")}</div>
      </div>
      <div class="song-actions"><button class="icon-btn" data-edit="${s.id}">Edit</button><button class="icon-btn danger" data-del="${s.id}">Delete</button></div>
    </article>`;
  }).join("");
  el.querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click",()=>startEdit(songs.find(s=>s.id===b.dataset.edit))));
  el.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>{
    if(b.dataset.armed==="1"){ removeSong(b.dataset.del); return; }
    b.dataset.armed="1"; b.textContent="Confirm?"; b.classList.add("armed");
    clearTimeout(b._t);
    b._t=setTimeout(()=>{ b.dataset.armed="0"; b.textContent="Delete"; b.classList.remove("armed"); }, 3000);
  }));
}
function renderAll(){ renderStats(); renderInsights(); renderSortBar(); renderList(); }

// ── Insights: radar + correlation heatmap ───────────────────
const getSong = id => songs.find(s=>s.id===id);

function pearson(xs, ys){
  const n=xs.length; if(n<2) return null;
  const mx=xs.reduce((a,b)=>a+b,0)/n, my=ys.reduce((a,b)=>a+b,0)/n;
  let num=0, dx=0, dy=0;
  for(let i=0;i<n;i++){ const a=xs[i]-mx, b=ys[i]-my; num+=a*b; dx+=a*a; dy+=b*b; }
  if(dx===0 || dy===0) return null; // no variance on an axis
  return num/Math.sqrt(dx*dy);
}

function corrColor(r){
  if(r===null) return "#241f1b";
  if(r>=0){ const t=Math.min(r,1); return `rgba(78,201,176,${0.12+0.78*t})`; }
  const t=Math.min(-r,1); return `rgba(255,107,74,${0.12+0.78*t})`;
}

function radarSVG(a, b){
  const size=240, cx=size/2, cy=size/2, R=80;
  const pt=(i,v)=>{ const ang=(-90+i*90)*Math.PI/180, r=(v/20)*R; return [cx+r*Math.cos(ang), cy+r*Math.sin(ang)]; };
  const poly=s=>DIMENSIONS.map((d,i)=>pt(i,Number(s[d.key])).join(",")).join(" ");
  const grid=[5,10,15,20].map(lv=>{
    const p=DIMENSIONS.map((d,i)=>pt(i,lv).join(",")).join(" ");
    return `<polygon points="${p}" fill="none" stroke="#2c2722" stroke-width="1"/>`;
  }).join("");
  const axes=DIMENSIONS.map((d,i)=>{ const [x,y]=pt(i,20); return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#2c2722" stroke-width="1"/>`; }).join("");
  const labels=DIMENSIONS.map((d,i)=>{ const [x,y]=pt(i,24); return `<text x="${x}" y="${y}" fill="#9a8f7f" font-size="11" text-anchor="middle" dominant-baseline="middle">${d.label}</text>`; }).join("");
  let shapes=`<polygon points="${poly(a)}" fill="rgba(78,201,176,.22)" stroke="#4ec9b0" stroke-width="2"/>`;
  if(b) shapes+=`<polygon points="${poly(b)}" fill="rgba(255,107,74,.18)" stroke="#ff6b4a" stroke-width="2"/>`;
  return `<svg viewBox="0 0 ${size} ${size}" width="240" height="240">${grid}${axes}${labels}${shapes}</svg>`;
}

function insightsContent(){
  // radar selectors
  const list=applySort(songs.slice());
  if(!radarA || !getSong(radarA)) radarA = list.length ? list[0].id : null;
  const opt=(sel,extraNone)=> (extraNone?`<option value="__none__" ${sel==="__none__"?"selected":""}>— none —</option>`:"") +
    list.map(s=>`<option value="${s.id}" ${sel===s.id?"selected":""}>${esc(s.title)}${s.artist?" · "+esc(s.artist):""}</option>`).join("");
  const a=getSong(radarA), b=(radarB!=="__none__"?getSong(radarB):null);
  const radar = `<div class="ins-block"><div class="ins-h">Song shape</div>
    <div class="radar-picks">
      <label class="radar-pick"><span>Song</span><select id="radar-a">${opt(radarA,false)}</select></label>
      <label class="radar-pick"><span>Compare with</span><select id="radar-b">${opt(radarB,true)}</select></label>
    </div>
    <div class="radar-wrap">${a?radarSVG(a,b):""}</div>
    <div class="radar-legend">
      ${a?`<span><span class="legdot" style="background:#4ec9b0"></span>${esc(a.title)} · ${fmt(overallOf(a))}</span>`:""}
      ${b?`<span><span class="legdot" style="background:#ff6b4a"></span>${esc(b.title)} · ${fmt(overallOf(b))}</span>`:""}
    </div></div>`;

  // correlation heatmap
  let heat;
  if(songs.length<3){
    heat=`<div class="ins-block"><div class="ins-h">Dimension correlations</div>
      <div class="ins-note">Need at least 3 songs to compute correlations — you have ${songs.length}. This panel fills in as you rate more.</div></div>`;
  } else {
    const cols=DIMENSIONS.map(d=>songs.map(s=>Number(s[d.key])));
    const short={lyrics:"Lyr",melody:"Mel",vocals:"Voc",emotiveness:"Emo"};
    let cells=`<div class="heat-cell" style="background:transparent"></div>` +
      DIMENSIONS.map(d=>`<div class="heat-head">${short[d.key]}</div>`).join("");
    DIMENSIONS.forEach((d,i)=>{
      cells+=`<div class="heat-rowhead">${short[d.key]}</div>`;
      DIMENSIONS.forEach((d2,j)=>{
        const r = i===j ? 1 : pearson(cols[i], cols[j]);
        const txt = r===null ? "–" : (i===j ? "1.00" : r.toFixed(2));
        const col = i===j ? "rgba(243,236,225,.14)" : corrColor(r);
        cells+=`<div class="heat-cell" style="background:${col}">${txt}</div>`;
      });
    });
    heat=`<div class="ins-block"><div class="ins-h">Dimension correlations</div>
      <div class="heat">${cells}</div>
      <div class="ins-note">How your four axes move together across all ${songs.length} songs. Teal = move together, coral = move oppositely, faint = unrelated. A pair near +0.9 means you're effectively rating one thing twice. ${songs.length<10?"Still noisy at this sample size — read it loosely until ~25+ songs.":""}</div></div>`;
  }
  return radar + heat;
}

function wireInsights(){
  const a=$("radar-a"), b=$("radar-b");
  if(a) a.addEventListener("change",e=>{ radarA=e.target.value; renderInsights(); });
  if(b) b.addEventListener("change",e=>{ radarB=e.target.value; renderInsights(); });
}

function renderInsights(){
  const el=$("insights");
  if(!songs.length){ el.className=""; el.innerHTML=""; return; }
  el.className="insights-card";
  el.innerHTML=`<button class="insights-toggle" id="insights-toggle">${insightsOpen?"▾":"▸"} Insights</button>${insightsOpen?insightsContent():""}`;
  $("insights-toggle").addEventListener("click",()=>{ insightsOpen=!insightsOpen; renderInsights(); });
  if(insightsOpen) wireInsights();
}

// ── CSV ──────────────────────────────────────────────────────
function exportCSV(){
  const headers=["Title","Artist","Album","Lyrics","Melody","Vocals","Emotiveness","Total","Overall","Added"];
  const cell=v=>{const s=String(v ?? "");return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
  const rows=applySort(songs.slice()).map(s=>[s.title,s.artist||"",s.album||"",Number(s.lyrics),Number(s.melody),Number(s.vocals),Number(s.emotiveness),totalOf(s),fmt(overallOf(s)),s.created_at]);
  const csv=[headers].concat(rows).map(r=>r.map(cell).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="music-ratings-"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

buildSliders();
$("title").addEventListener("input", refreshDraft);
$("save-btn").addEventListener("click", save);
$("cancel-btn").addEventListener("click", resetForm);
refreshDraft();

$("login-btn").addEventListener("click", async () => {
  const email=$("login-email").value.trim(), pass=$("login-pass").value;
  const errEl=$("login-err"), btn=$("login-btn");
  errEl.textContent=""; if(!email||!pass){ errEl.textContent="Enter your email and password."; return; }
  btn.disabled=true; btn.textContent="Signing in…";
  try { await signIn(email, pass); showApp(); loadSongs(); }
  catch(err){ errEl.textContent = err.message; }
  finally { btn.disabled=false; btn.textContent="Sign in"; }
});
$("login-pass").addEventListener("keydown", e => { if(e.key==="Enter") $("login-btn").click(); });
$("signout").addEventListener("click", () => { clearSession(); songs=[]; showLogin(); });

// boot: resume session if valid, else login
(async function boot(){
  session = loadSession();
  if(session && session.access_token){
    const now=Math.floor(Date.now()/1000);
    if(session.expires_at && session.expires_at - now < 60){ const ok=await refresh(); if(!ok){ clearSession(); showLogin(); return; } }
    showApp(); loadSongs();
  } else { showLogin(); }
})();
</script>
